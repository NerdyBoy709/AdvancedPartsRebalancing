//
// Updated Localization
//

Localization
{
    en-us
    {
        #LOC_NFSolar_switcher_cell_basic_updated_summary = <color=#00ff0c>+0% power</color>, <color=#ff0000>+0% mass, +0% cost</color>
        #LOC_NFSolar_switcher_cell_basic_updated_detail = Basic cells delivers lowest power per area at a lowest mass and cost , poor heat tolerance.

        #LOC_NFSolar_switcher_cell_adv_updated_summary = <color=#00ff0c>+40% power</color>, <color=#ff0000>+60% mass, +65-70% cost</color>
        #LOC_NFSolar_switcher_cell_adv_updated_detail = Advanced cells delivers more power per area at a higher cost and mass , decent heat tolerance.

        #LOC_NFSolar_switcher_cell_concentrating_updated_summary = <color=#00ff0c>+200% power</color>, <color=#ff0000>+400% mass, +200% cost</color>
        #LOC_NFSolar_switcher_cell_concentrating_updated_detail = Concentrator cells deliver best power per area at a hefty cost and mass increase , great heat tolerance.
    }
}

//
// Thermal Rebalance
//

@PART[nfs-panel*]:HAS[~name[nfs-panel-curved-*],@MODULE[ModuleB9PartSwitch]]:AFTER[NearFutureSolar]
{
    @maxTemp = 1200
    skinMaxTemp = 1500
    skinThermalMassModifier = 0.75
    @thermalMassModifier = 1.0
    %emissiveConstant = 0.90
    radiatorMax = 0.25
}

@PART[nfs-panel-curved*]:HAS[@MODULE[ModuleB9PartSwitch]]:AFTER[NearFutureSolar]
{
    @maxTemp = 1200
    skinMaxTemp = 1700
    skinThermalMassModifier = 1.5
    @thermalMassModifier = 1.1
    %emissiveConstant = 0.80
    radiatorMax = 0.05
}

