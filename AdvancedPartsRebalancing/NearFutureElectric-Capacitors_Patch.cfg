@PART[capacitor-25]:AFTER[NearFutureElectrical]
{
    @MODULE[DischargeCapacitor]
    {
        @ChargeRate = 100
        @DischargeRate = 10000
        @MaximumCharge = 100000
    }
    @RESOURCE[StoredCharge]
    {
        @amount = 100000
        @maxAmount = 100000
    }
}

