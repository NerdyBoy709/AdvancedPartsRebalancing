@PART[vasimr-25]:AFTER[SystemHeatIonEngines]
{
    @MODULE[ModuleSystemHeatEngine]:HAS[#moduleID[engineA]]
    {
        @systemPower = 440
    }
    @MODULE[ModuleSystemHeatEngine]:HAS[#moduleID[engineX]]
    {
        @systemPower = 630
    }    
}
